{{ $a := .Params.a }}
<div class="detail">
  {{ partial "follow-card.html" (dict "a" $a) }}
  {{ with .Content }}
  <section class="detail-section">
    <h2><span class="rule"></span>{{ i18n "detail_history" }}</h2>
    {{ . }}
  </section>
  {{ end }}
  <p class="detail-back"><a href="{{ "follow/" | relURL }}#follow-{{ $a.id }}">&larr; {{ i18n "back_to_list" }}</a></p>
</div>
