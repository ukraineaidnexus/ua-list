{{ $c := .Params.c }}
<div class="detail">
  <aside class="detail-side">
    {{ partial "creator-card.html" (dict "c" $c) }}
    <p class="detail-back"><a href="{{ "creators/" | relURL }}#creator-{{ $c.id }}">&larr; {{ i18n "back_to_list" }}</a></p>
  </aside>
  <div class="detail-main">
    {{ with .Content }}
    <section class="detail-section">
      <h2><span class="rule"></span>{{ i18n "detail_history" }}</h2>
      {{ . }}
    </section>
    {{ end }}
  </div>
</div>
